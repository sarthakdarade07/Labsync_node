# =============================================
# LabSync LMS - Application Configuration
# =============================================

# Server
server.port=8080
server.servlet.context-path=/api

# =============================================
# Database Configuration
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/labsync_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Sarthak@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# =============================================
# JPA / Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# =============================================
# JWT Configuration
# =============================================
app.jwt.secret=LabSyncJWTSecretKey2024VeryLongAndSecureKeyForHMACSHA256AlgorithmUsage
app.jwt.expiration-ms=86400000
# 86400000 ms = 24 hours

# =============================================
# Logging
# =============================================
logging.level.com.labsync=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG

# =============================================
# Jackson (JSON)
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
